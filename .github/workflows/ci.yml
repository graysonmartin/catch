name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & Test
        run: |
          xcodebuild test \
            -project catch.xcodeproj \
            -scheme catchTests \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}
